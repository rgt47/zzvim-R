name: Test zzvim-R Plugin

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: ${{ matrix.editor }} ${{ matrix.version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          # Stable across the full OS × editor grid
          - { os: ubuntu-latest,  editor: vim,    version: stable }
          - { os: ubuntu-latest,  editor: neovim, version: stable }
          - { os: macos-latest,   editor: vim,    version: stable }
          - { os: macos-latest,   editor: neovim, version: stable }
          - { os: windows-latest, editor: vim,    version: stable }
          - { os: windows-latest, editor: neovim, version: stable }
          # Nightly on Ubuntu only: catches upstream breakage early
          # without multiplying flake surface across OSes.
          # experimental=true marks the cell continue-on-error so
          # upstream regressions do not red-CI legitimate PRs.
          - { os: ubuntu-latest,  editor: vim,    version: nightly, experimental: true }
          - { os: ubuntu-latest,  editor: neovim, version: nightly, experimental: true }

    steps:
    - uses: actions/checkout@v4

    - name: Set up ${{ matrix.editor }} ${{ matrix.version }}
      uses: rhysd/action-setup-vim@v1
      with:
        neovim: ${{ matrix.editor == 'neovim' }}
        version: ${{ matrix.version }}

    # R is not a runtime dependency of the current test suite — the
    # functional specs exercise VimScript logic, not R evaluation.
    # No R installation step is necessary.

    - name: Plugin syntax check
      timeout-minutes: 2
      run: |
        if [ "${{ matrix.editor }}" = "vim" ]; then
          vim -es -c 'source plugin/zzvim-R.vim' -c 'qa!'
        else
          nvim --headless -c 'source plugin/zzvim-R.vim' -c 'qa!'
        fi

    - name: Helptags generation
      timeout-minutes: 2
      run: |
        if [ "${{ matrix.editor }}" = "vim" ]; then
          vim -es -c 'helptags doc/' -c 'qa!'
        else
          nvim --headless -c 'helptags doc/' -c 'qa!'
        fi

    - name: Smoke tests
      timeout-minutes: 5
      run: |
        if [ "${{ matrix.editor }}" = "vim" ]; then
          make smoke SMOKE_CMD='vim -es'
        else
          make smoke SMOKE_CMD='nvim --headless -es'
        fi

    - name: Install vim-themis
      run: make themis-install

    - name: Functional tests
      timeout-minutes: 5
      run: |
        if [ "${{ matrix.editor }}" = "vim" ]; then
          make functional THEMIS_VIM=vim
        else
          make functional THEMIS_VIM=nvim
        fi

  lint:
    name: vint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install vint
      run: pip install vim-vint
    - name: Lint plugin/zzvim-R.vim
      run: vint -e plugin/zzvim-R.vim
