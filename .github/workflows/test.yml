name: Test zzvim-R Plugin

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: ${{ matrix.editor }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        editor: [vim, neovim]

    steps:
    - uses: actions/checkout@v4

    - name: Set up ${{ matrix.editor }}
      uses: rhysd/action-setup-vim@v1
      with:
        neovim: ${{ matrix.editor == 'neovim' }}
        version: stable

    - name: Install R
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          sudo apt-get update
          sudo apt-get install -y r-base
        else
          brew install r
        fi

    - name: Verify R installation
      run: R --version

    - name: Plugin syntax check
      timeout-minutes: 2
      run: |
        if [ "${{ matrix.editor }}" = "vim" ]; then
          vim -es -c 'source plugin/zzvim-R.vim' -c 'qa!'
        else
          nvim --headless -c 'source plugin/zzvim-R.vim' -c 'qa!'
        fi

    - name: Helptags generation
      timeout-minutes: 2
      run: |
        if [ "${{ matrix.editor }}" = "vim" ]; then
          vim -es -c 'helptags doc/' -c 'qa!'
        else
          nvim --headless -c 'helptags doc/' -c 'qa!'
        fi

    - name: Smoke tests
      timeout-minutes: 5
      run: |
        if [ "${{ matrix.editor }}" = "vim" ]; then
          make smoke SMOKE_CMD='vim -es'
        else
          make smoke SMOKE_CMD='nvim --headless -es'
        fi

    - name: Install vim-themis
      run: make themis-install

    - name: Functional tests
      timeout-minutes: 5
      run: |
        if [ "${{ matrix.editor }}" = "vim" ]; then
          make functional THEMIS_VIM=vim
        else
          make functional THEMIS_VIM=nvim
        fi

  lint:
    name: vint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install vint
      run: pip install vim-vint
    - name: Lint plugin/zzvim-R.vim
      run: vint -e plugin/zzvim-R.vim
