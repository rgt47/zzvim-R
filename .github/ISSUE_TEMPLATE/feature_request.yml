name: Feature request
description: Suggest an enhancement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: |
        What are you trying to do today that is awkward, slow, or
        impossible? Describe the workflow, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: |
        What would make the workflow work better? If you have a
        specific command, mapping, or configuration variable in
        mind, include it.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other approaches you have tried or considered, and why they
        fell short.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I have checked `:help zzvim-R` and the README for existing functionality that might already address this.
